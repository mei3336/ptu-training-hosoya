services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: community_app
    volumes:
      - db_data:/var/lib/postgresql/data # ★コンテナを消してもデータが消えないように永続化
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/community_app # ★Railsが自動接続するためのURL
      - RAILS_ENV=development
    depends_on:
      - db 

  frontend:
    image: node:22
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules # ★コンテナ内の高速なnode_modulesと、ホストPC側の環境を混ぜないためのハック
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"

  web:
    image: nginx:alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro # Nginxの設定ファイルをマウント
    ports:
      - "80:80" # パソコン上の標準ポート80をNginxに繋ぐ
    depends_on:
      - backend
      - frontend

# 名前付きボリュームの定義
volumes:
  db_data: